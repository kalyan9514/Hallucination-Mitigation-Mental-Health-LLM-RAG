# .github/workflows/ci.yml
# Runs basic checks on every push and pull request to main

name: CI

on:
  push:
    branches: [main, refactor/production-structure]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          flake8 config/ internal/ cmd/ --max-line-length=100 --ignore=E501,W503,W292,W293,F401

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short || true